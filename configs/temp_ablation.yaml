project:
  name: op1_orthoY_hsampleENT_hbatchENT_tempAblation
  family: nanopath
  recipe_id: dinov2-vits14-op1_orthoY_hsampleENT_hbatchENT_tempAblation
  output_dir: /data/$USER/nanopath/20260719_op1_orthoY_hsampleENT_hbatchENT_tempAblation
  wandb_dir: /data/$USER/nanopath/wandb

data:
  # dataset_dir holds the parquet shards (shard-NNNNN.parquet) that train.py reads.
  # `prepare.py … download=True` populates it from the medarc/nanopath HF mirror.
  dataset_dir: /data/nanopath_parquet
  split_seed: 7777
  val_fraction: 0.05
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  global_crop_scale: [0.2, 1.0]
  local_crop_scale: [0.03, 0.25]
  color_jitter: 0.45
  color_jitter_saturation: 0.4
  hed_jitter: 0.12
  tissue_thresh: 0.5 # training rejects tiles unless this fraction of pixels has RGB saturation > 0.07

model:
  type: dinov2_vits14_reg

train:
  seed: 7777
  bf16: true
  activation_checkpointing: false
  batch_size: 128
  num_workers: 16
  prefetch_factor: 2
  persistent_workers: true
  max_train_samples: 1000000 # tile presentations; global/local crops still count as one sample
  max_train_flops: 1000000000000000000 # 1.0e18, the leaderboard FLOP budget
  log_every: 20
  save_every: 1000
  # Validation pass every `eval_every` steps over `val_batches` held-out batches
  eval_every: 200
  val_batches: 16
  global_views: 2
  local_views: 8
  global_size: 224
  local_size: 98
  resume: null # optional explicit checkpoint path; null means always start fresh and wipe output_dir

dino:
  lr: 1.0e-4
  lr_min: 1.0e-6
  adam_beta2: 0.99
  warmup_fraction: 0.03
  freeze_last_layer_fraction: 0.0091
  layerwise_decay: 0.7
  patch_embed_lr_mult: 0.2
  drop_path_rate: 0.1
  head_hidden_dim: 2048
  head_bottleneck_dim: 384
  clip_grad: 3.0
  # KDE uniformity regularizer on CLS embeddings, used when prototype_head.reg_type == "kde".
  # Defaults match the historical KDE recipe (see configs/smoke.yaml).
  kde_loss_weight: 0.002
  kde_concentration: 10.0  # cosine-similarity scale inside the logsumexp; higher = sharper repulsion

prototype_head:
  n_prototypes: 256
  hidden_dim: 768
  prototype_dim: 512
  n_layers: 3
  ns_steps: 5
  # true: keep the prototype bank orthonormal via Newton-Schulz (ns_steps). false: only unit-norm
  # each prototype, ablating the mutual-orthogonality constraint (scores stay cosine in [-1, 1]).
  orthogonal: true
  # iBOT patch branch: "sinkhorn" (DINOHead + Sinkhorn-centred targets, restores anti-collapse)
  # or "prototype" (PrototypeHead + plain-softmax targets, mirroring the CLS branch).
  ibot_mode: prototype
  reg_type: kde  # anti-collapse shape regularizer: "swd" (score_swd) or "kde" (dino.kde_* knobs)
  score_reg_weight: 0.1
  # Assignment-shaping term (anti-collapse + per-sample code shaping) = per-sample axis - h_batch.
  # sample_reg_type picks the per-sample axis: "swd" pulls each score row toward a graded Gaussian
  # (distributed, multi-prototype code) via sample_swd_weight; "entropy" minimizes h_per to sharpen
  # toward one-hot (original ME-MAX) via sample_entropy_weight. The inactive term is still logged as a
  # monitor. The two weights are separate because the terms differ in scale (samp_swd ~O(0.1-1),
  # h_per ~O(0-ln n_prototypes)). Batch axis: h_batch maximization spreads the marginal;
  # entropy_reg_temp only affects the h_per/h_batch monitors (softmax temp), not sample_swd (raw
  # scores). Lower batch_entropy_weight lets the marginal follow the true tissue mix rather than being
  # pushed uniform (the behavior we dropped Sinkhorn to avoid).
  sample_reg_type: entropy  # per-sample axis: "swd" (sample_swd) or "entropy" (h_per minimization)
  entropy_reg_weight: 0.001  # master switch for the term; 0 = disabled (samp_swd/h_per/h_batch still logged)
  entropy_reg_temp: 0.25
  sample_swd_weight: 1.0      # weight when sample_reg_type == "swd"
  sample_entropy_weight: 1.0  # weight when sample_reg_type == "entropy"
  batch_entropy_weight: 1.0

probe:
  enabled: true
  model_weights: ema
  count: 1 # 4 means probing at 25%, 50%, 75%, and 100% of the sample cap. 1 means probing just at the end.
  datasets:
    - bracs
    - break_his
    - mhist
    - pcam
  segmentation_datasets:
    - pannuke
    - monusac
    - consep
  slide_datasets:
    - ucla_lung
  auc_datasets:
    - surgen
  survival_datasets:
    - leopard_bcr
    - cptac_pda_os
  robustness_datasets:
    - pathorob
  dataset_roots:
    bracs: /data/eva-data/bracs
    break_his: /data/eva-data/breakhis
    consep: /data/eva-data/consep
    cptac_pda_os: /data/CPTAC-PDA
    leopard_bcr: /data/leopard_bcr
    mhist: /data/eva-data/mhist
    monusac: /data/eva-data/monusac
    pcam: /data/eva-data/patch_camelyon
    pannuke: /data/thunder-data/pannuke
    pathorob: /data/pathorob
    surgen: /data/surgen
    ucla_lung: /data/ucla-lung
