project:
  name: op1_orthoY_swdY_hsampleENT_hbatchENT_t0_25
  family: nanopath
  recipe_id: dinov2-vits14-op1_orthoY_swdY_hsampleENT_hbatchENT_t0_25
  output_dir: /data/$USER/nanopath/20260719_op1_orthoY_swdY_hsampleENT_hbatchENT_t0_25
  wandb_dir: /data/$USER/nanopath/wandb

data:
  # dataset_dir holds the parquet shards (shard-NNNNN.parquet) that train.py reads.
  # `prepare.py … download=True` populates it from the medarc/nanopath HF mirror.
  dataset_dir: /data/nanopath_parquet
  split_seed: 7777
  val_fraction: 0.05
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  global_crop_scale: [0.2, 1.0]
  local_crop_scale: [0.03, 0.25]
  color_jitter: 0.45
  color_jitter_saturation: 0.4
  hed_jitter: 0.12
  tissue_thresh: 0.5 # training rejects tiles unless this fraction of pixels has RGB saturation > 0.07

model:
  type: dinov2_vits14_reg

train:
  seed: 7777
  bf16: true
  activation_checkpointing: false
  batch_size: 128
  num_workers: 16
  prefetch_factor: 2
  persistent_workers: true
  max_train_samples: 1000000 # tile presentations; global/local crops still count as one sample
  max_train_flops: 1000000000000000000 # 1.0e18, the leaderboard FLOP budget
  log_every: 20
  save_every: 1000
  # Validation pass every `eval_every` steps over `val_batches` held-out batches
  eval_every: 200
  val_batches: 16
  global_views: 2
  local_views: 8
  global_size: 224
  local_size: 98
  resume: null # optional explicit checkpoint path; null means always start fresh and wipe output_dir

dino:
  lr: 1.0e-4
  lr_min: 1.0e-6
  adam_beta2: 0.99
  warmup_fraction: 0.03
  freeze_last_layer_fraction: 0.0091
  layerwise_decay: 0.7
  patch_embed_lr_mult: 0.2
  drop_path_rate: 0.1
  head_hidden_dim: 2048
  head_bottleneck_dim: 384
  clip_grad: 3.0
  # KDE uniformity regularizer on the CLS embeddings (embedding-space anti-collapse), independent of
  # the prototype_head score-space ontology. 0 disables it. Defaults match the historical KDE recipe.
  kde_loss_weight: 0.002
  kde_concentration: 10.0  # cosine-similarity scale inside the logsumexp; higher = sharper repulsion

prototype_head:
  n_prototypes: 256
  hidden_dim: 768
  prototype_dim: 512
  n_layers: 3
  ns_steps: 5
  # true: keep the prototype bank orthonormal via Newton-Schulz (ns_steps). false: only unit-norm
  # each prototype, ablating the mutual-orthogonality constraint (scores stay cosine in [-1, 1]).
  orthogonal: true
  # iBOT patch branch: "sinkhorn" (DINOHead + Sinkhorn-centred targets, restores anti-collapse)
  # or "prototype" (PrototypeHead + plain-softmax targets, mirroring the CLS branch).
  ibot_mode: prototype
  # Assignment-shaping regularizer on the CLS prototype scores, along two independent axes. Each axis
  # picks (1) SWD on/off -- a scale-invariant Gaussian *shape* term (sample_swd per row / score_swd
  # across the batch), and (2) a dispersion type that controls *width*: none | entropy | gini.
  # per_sample dispersion is MINIMIZED (sharpen/concentrate each row); per_batch dispersion is
  # MAXIMIZED (widen/spread the marginal, anti-collapse). entropy = Shannon (h_per/h_batch), gini =
  # Gini-Simpson 1 - sum_k p_k^2 (g_per/g_batch). SWD fixes shape, dispersion fixes width; together
  # per_sample = a narrow Gaussian row, per_batch = a wide Gaussian marginal. Each term is
  # absolute-weighted (no master multiplier); on:false or weight:0 or type:none disables just that
  # term. All monitors (samp_swd/batch_swd/h_per/h_batch/g_per/g_batch) are logged regardless.
  # reg_temp is the softmax temperature for the dispersion measures only (SWD acts on raw scores).
  # KDE (embedding-space anti-collapse) is independent: dino.kde_loss_weight (0 disables it).
  reg_temp: 0.25
  per_sample:                                    # dispersion minimized -> sharpen / concentrate rows
    swd: { enabled: true, weight: 0.5 }
    dispersion: { type: entropy, weight: 0.3 }      # type: none | entropy | gini
  per_batch:                                     # dispersion maximized -> widen / spread the marginal
    swd: { enabled: true, weight: 0.1 }
    dispersion: { type: entropy, weight: 0.2 }

probe:
  enabled: true
  model_weights: ema
  count: 1 # 4 means probing at 25%, 50%, 75%, and 100% of the sample cap. 1 means probing just at the end.
  datasets:
    - bracs
    - break_his
    - mhist
    - pcam
  segmentation_datasets:
    - pannuke
    - monusac
    - consep
  slide_datasets:
    - ucla_lung
  auc_datasets:
    - surgen
  survival_datasets:
    - leopard_bcr
    - cptac_pda_os
  robustness_datasets:
    - pathorob
  dataset_roots:
    bracs: /data/eva-data/bracs
    break_his: /data/eva-data/breakhis
    consep: /data/eva-data/consep
    cptac_pda_os: /data/CPTAC-PDA
    leopard_bcr: /data/leopard_bcr
    mhist: /data/eva-data/mhist
    monusac: /data/eva-data/monusac
    pcam: /data/eva-data/patch_camelyon
    pannuke: /data/thunder-data/pannuke
    pathorob: /data/pathorob
    surgen: /data/surgen
    ucla_lung: /data/ucla-lung
